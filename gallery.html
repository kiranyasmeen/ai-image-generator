<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxion AI | Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Fluxion<span>.AI</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html" class="active">Studio</a></li>
            <li><a href="models.html">Models</a></li>
            <li><a href="pricing.html">Pricing</a></li>
        </ul>
        <a href="gallery.html" class="btn-primary" style="padding: 10px 25px; font-size: 0.9rem;">Start Creating</a>
    </nav>

    <div class="page-header" style="padding-top: 130px; text-align: center; padding-bottom: 30px;">
        <h1 style="font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px;">AI Art <span class="accent">Studio</span></h1>
        
        <div class="generator-container" style="max-width: 800px; margin: 30px auto; display: flex; flex-direction: column; gap: 12px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--border); backdrop-filter: blur(10px);">
            <div style="display: flex; gap: 10px; width: 100%;">
                <input type="text" id="prompt-input" placeholder="A futuristic city in the clouds..." style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; padding: 12px 18px; font-size: 16px; outline: none; transition: 0.3s;">
                <button onclick="enhancePrompt()" id="enhance-btn" style="background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 0 15px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.3s;">✨ ENHANCE</button>
            </div>
            <button onclick="generateImage()" id="gen-btn" style="width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 15px; transition: 0.3s; letter-spacing: 1px; box-shadow: 0 10px 25px var(--accent-glow);">GENERATE MASTERPIECE</button>
        </div>
        
        <!-- Live Result Area -->
        <div id="result-area" style="display: none; margin-top: 40px;">
            <div class="gallery-item" style="max-width: 500px; margin: 0 auto; background: var(--surface); border: 1px solid var(--accent); padding: 10px; border-radius: 20px;">
                <div style="position: relative;">
                    <img id="result-img" src="" alt="Generated Art" style="width: 100%; border-radius: 12px;">
                    <div id="loader-overlay" style="display: none; position: absolute; inset: 0; background: rgba(10,10,11,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px;">
                        <div class="spinner"></div>
                        <p style="margin-top: 15px; font-weight: 800; letter-spacing: 2px; color: var(--accent); font-size: 12px;">PAINTING...</p>
                    </div>
                </div>
                <div class="gallery-item-info" style="text-align: left; padding: 15px 5px;">
                    <div style="margin-top: 10px;">
                        <button onclick="downloadImage()" style="width: 100%; padding: 12px; font-size: 13px; background: #10B981; border: none; border-radius: 8px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s;">💾 DOWNLOAD IMAGE</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- History Grid (Asset Manager Layout) -->
    <section class="gallery-section" style="border-top: 1px solid var(--border); padding-top: 60px;">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
                <h2 style="font-size: 2rem; font-weight: 900; letter-spacing: -1.5px; margin: 0;">Studio <span class="accent">Vault</span></h2>
                <button onclick="clearHistory()" style="background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;">CLEAR ALL</button>
            </div>
            <div id="history-grid" class="gallery-grid" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem;">
                <!-- History items injected here -->
            </div>
        </div>
    </section>

    <script>
        let db;
        const dbRequest = indexedDB.open('FluxionStudioDB', 1);
        dbRequest.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('history')) {
                db.createObjectStore('history', { keyPath: 'id', autoIncrement: true });
            }
        };
        dbRequest.onsuccess = (e) => {
            db = e.target.result;
            updateHistoryUI();
        };

        function updateHistoryUI() {
            if (!db) return;
            const transaction = db.transaction(['history'], 'readonly');
            const store = transaction.objectStore('history');
            const request = store.getAll();
            request.onsuccess = () => {
                const historyItems = request.result.reverse();
                const grid = document.getElementById('history-grid');
                grid.innerHTML = historyItems.map((item) => {
                    const url = URL.createObjectURL(item.blob);
                    return `
                        <div class="gallery-item" style="border-radius: 12px; border: 1px solid var(--border); overflow: hidden; background: var(--surface);">
                            <img src="${url}" alt="Generated Image" style="width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block;">
                            <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3);">
                                <div style="display: flex; gap: 8px;">
                                    <button onclick="downloadFromUrl('${url}')" style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 5px; border-radius: 6px; cursor: pointer; font-size: 14px;">💾</button>
                                    <button onclick="deleteItem(${item.id})" style="background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #ef4444; padding: 5px; border-radius: 6px; cursor: pointer; font-size: 14px;">🗑️</button>
                                </div>
                                <span style="font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3);">#${item.id}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            };
        }

        async function generateImage() {
            const input = document.getElementById('prompt-input');
            const prompt = input.value.trim();
            const btn = document.getElementById('gen-btn');
            const resultArea = document.getElementById('result-area');
            const resultImg = document.getElementById('result-img');
            const loader = document.getElementById('loader-overlay');

            if (!prompt) return;

            btn.disabled = true;
            btn.innerText = 'PAINTING...';
            loader.style.display = 'flex';
            resultArea.style.display = 'block';
            resultImg.style.opacity = '0.1';

            try {
                const res = await fetch(`/api/generate?prompt=${encodeURIComponent(prompt)}&model=flux&t=${Date.now()}`);
                if (!res.ok) throw new Error('Busy. Retrying...');
                
                const blob = await res.blob();
                const objectURL = URL.createObjectURL(blob);
                
                const transaction = db.transaction(['history'], 'readwrite');
                const store = transaction.objectStore('history');
                store.add({ prompt, blob, timestamp: Date.now() });
                transaction.oncomplete = () => updateHistoryUI();

                resultImg.src = objectURL;
                resultImg.onload = () => {
                    loader.style.display = 'none';
                    resultImg.style.opacity = '1';
                    btn.disabled = false;
                    btn.innerText = 'GENERATE MASTERPIECE';
                };
            } catch (e) {
                btn.disabled = false;
                btn.innerText = 'GENERATE MASTERPIECE';
                loader.style.display = 'none';
                alert(e.message);
            }
        }

        function deleteItem(id) {
            if (confirm('Delete this image?')) {
                const transaction = db.transaction(['history'], 'readwrite');
                transaction.objectStore('history').delete(id);
                transaction.oncomplete = () => updateHistoryUI();
            }
        }

        async function enhancePrompt() {
            const input = document.getElementById('prompt-input');
            const btn = document.getElementById('enhance-btn');
            const prompt = input.value.trim();
            if (!prompt) return;
            btn.innerText = '...';
            try {
                const res = await fetch(`/api/enhance?prompt=${encodeURIComponent(prompt)}`);
                const data = await res.json();
                if (data.enhanced) input.value = data.enhanced;
            } finally {
                btn.innerText = '✨ ENHANCE';
            }
        }

        function downloadImage() {
            const img = document.getElementById('result-img');
            if (img.src) downloadFromUrl(img.src);
        }

        function downloadFromUrl(url) {
            const a = document.createElement('a');
            a.href = url;
            a.download = `fluxion-${Date.now()}.png`;
            a.click();
        }

        function clearHistory() {
            if (confirm('Clear entire studio vault?')) {
                const transaction = db.transaction(['history'], 'readwrite');
                transaction.objectStore('history').clear();
                transaction.oncomplete = () => updateHistoryUI();
            }
        }
    </script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(16,185,129,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</body>
</html>
